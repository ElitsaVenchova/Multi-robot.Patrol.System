simulation:
  duration: 7200
  perimeterSize: 1000
  seed: 42
  chargeThreshold: 20.0

robots:
  - model: turtlebot_pi
    count: 3

  - model: drone
    count: 2

chargingStations:
  - model: fast_station
    x: 20.0
    y: 5.0

  - model: cheap_station
    x: 60.0
    y: 2.0

patrol:
  model: RingPatrol
  robotsPerSection: 2

attackModel:
  model: PoissonAttack
  lambda: 0.3